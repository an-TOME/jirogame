<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>人狼</title>
    <link rel="icon" href="./favicon.png">
    <!-- <link rel="stylesheet" href="./style.css"> -->
</head>
<body>

<div class="status-area">
    <div id="status">Firebase接続確認中...</div>
    
    <input type="text" id="userName" placeholder="あなたの名前を入力">
    <br>
    <button id="btn-join">参加する</button>
    <br>
    あなたの名前: <span id="name-display">未参加</span>
    <br>
    <!---
    現在のスコア: <span id="score-display">0</span>
    <br>
    -->
    あなたの役職: <div id="role-display">参加したら役職が表示されます</div>
</div>

<hr>

<div class="info-area">

    今の参加人数: <span id="player-count">0</span>人
    <br>

    <div id="player-list">参加者の名前がここに表示されます</div>
    <br>

    <br>
    <div id="alive-list">生存者の名前がここに表示されます</div>
    <!--現在プレイヤーリストに併合中、死亡者にのみ表示する予定-->
    <br>

</div>

<hr>

<div class="gameinfo-area">

    日数: <span id="day-count">0</span>日目
    <br>
    現在の時間帯: <span id="time-display">不明</span>
    <br>
    現在の勝利陣営: <span id="winner-display">不明</span>
    <br>
    生存人数: <span id="alive-count">0</span>人
    <br>
    

</div>

<div class="game-area">

    <div id="action-display">行動内容がここに表示されます。ゲーム開始までお待ちください。</div> 

    <div id="vote-list"></div>

    <button id="btn-action">行動</button>
    <br>
    <button id="btn-next">次のフェーズへ</button>

<hr>

<div class="roll-area">

    <div class="role-counter">

        <div class="counter">
            市民：
            <span id="citizen-count">0</span>人
        </div>

        <div class="counter">
            人狼：
            <input type="number" class="value" id="wolf-count" value="0" min="0">
            <!--
            <botton id="decrease1">-</botton>
            <span id="value1">0</span>
            <botton id="increase1">+</botton>
            -->
        </div>

        <div class="counter">
            占い師：
            <input type="number" class="value" id="seer-count" value="0" min="0">
        </div>

        <div class="counter">
            狂人：
            <input type="number" class="value" id="madman-count" value="0" min="0">
        </div>


    </div>

    <button id="btn-assign">役職を配る（誰か1人）</button>

</div>

<hr>

<div class="score-area">

    全員のスコア:
    <div id="score-list">全員のスコアがここに表示されます</div>

</div>

<hr>

<div class="admin-area">

    <button id="randomkill">ランダムに1人殺す(テスト用)</button>

    <button id="btn-allget">全てのデータを表示</button>
    <br>
    <button id="btn-alldelete">全データ削除</button>

</div>



<script type="module" src="./main.js"></script>
</body>
</html>
